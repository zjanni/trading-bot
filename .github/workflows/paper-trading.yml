name: Paper-Trading

on:
  schedule:
    - cron: "23 5 * * *"   # täglich um 05:23 UTC (~07:23 Schweizer Sommerzeit)
  workflow_dispatch: {}     # erlaubt manuellen Start über den Actions-Tab

permissions:
  contents: write

jobs:
  handeln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Paper-Trading ausführen
        run: python paper_trading.py

      - name: Depot und Dashboard committen
        run: |
          git config user.name "trading-bot"
          git config user.email "actions@users.noreply.github.com"
          git add depot.json docs
          git diff --staged --quiet || git commit -m "Paper-Trading $(date -u +%Y-%m-%d)"
          git push
